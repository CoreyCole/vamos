app:
  name: Vamos
  account_label: company account

runtime:
  thoughts_repo: /absolute/path/to/host-repo
  thoughts_root: /absolute/path/to/host-repo/thoughts
  state_dir: ~/.local/state/vamos
  database_path: ~/.local/state/vamos/agents.db

web:
  listen_address: :4200
  public_base_url: http://localhost:4200
  cors_allowed_origins:
    - http://localhost:4200

auth:
  # Google OAuth web client JSON. Local quickstart callback:
  # http://localhost:4200/auth/google/callback
  google_credentials_file: /absolute/path/to/google-client-secret.json
  # Recommended for first local run: allow exactly your developer email.
  whitelisted_emails:
    - developer@example.com
  # Team deployments may use allowed domains instead of or in addition to explicit emails.
  allowed_domains: []

projects:
  default_repo: vamos
  default_checkout: local
  repos:
    vamos:
      github_url: https://github.com/CoreyCole/vamos
      default_branch: main
      default_checkout: local
      baseline_checkout: vamos-main
      checkouts:
        local:
          root_path: /absolute/path/to/vamos
          purpose: working
        vamos-main:
          root_path: /absolute/path/to/vamos-main
          purpose: baseline
          must_be_clean: true
          must_be_latest: true
          webhook_sync_branch: main

workspaces:
  mode: standalone
  metadata_dir_name: .vamos
  checkout_prefixes: [vamos]
  main_checkout_name: vamos
  module_marker: go.mod
  package_subdir: ""

deploy:
  web_service_name: vamos
  ts_worker_service_name: vamos-ts-worker
  # webhook_secret: ${render in private config or env}
  # webhook_forwards:
  #   - url: http://127.0.0.1:4301/api/webhook/github
  #     github_repos:
  #       - owner/repo
  #     events: [push]
  #     # Empty secret preserves original X-Hub-Signature-256 and requires the downstream host to share webhook_secret.
  #     secret: ""
  #     timeout: 15s
  #     best_effort: true
